name: Sales Request
description: Capture a sales-driven request with only the details needed to route it
title: "[sales] "
labels:
  - sales

body:
  - type: markdown
    attributes:
      value: |
        Use this for requests coming from sales. Add just enough context to route and prioritize it.

  - type: input
    id: account
    attributes:
      label: Customer, prospect, or deal
      placeholder: "Acme Manufacturing / SFDC-10482"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: What is being requested?
      description: Short summary of the request and the business context.
      placeholder: "Prospect needs SAML group-to-role mapping to close the deal."
    validations:
      required: true

  - type: input
    id: affected_area
    attributes:
      label: App, service, or area
      placeholder: "auth-service / SAML provisioning"

  - type: input
    id: deadline
    attributes:
      label: Deadline
      placeholder: "2026-05-15"

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmation
      options:
        - label: This request came from sales
          required: true