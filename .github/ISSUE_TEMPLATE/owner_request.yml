name: Owner Request
description: Capture a product owner request with minimal boilerplate
title: "[owner] "
labels:
  - owner

body:
  - type: markdown
    attributes:
      value: |
        Use this for product owner requests that should be tracked separately from general feature work.

  - type: textarea
    id: summary
    attributes:
      label: What is needed?
      description: Short description of the request.
      placeholder: "Add contract renewal alerts to the account overview."
    validations:
      required: true

  - type: input
    id: affected_area
    attributes:
      label: App, service, or area
      placeholder: "customer-portal / account overview"

  - type: textarea
    id: details
    attributes:
      label: Why does it matter?
      description: Add context, expected outcome, or scope notes.
      placeholder: "Product owners need renewal visibility in the main account view to reduce missed follow-up tasks."

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmation
      options:
        - label: I searched for an existing request
          required: true