name: Bug
description: Report a bug with the key details needed to triage it quickly
type: bug
title: "[bug] "
labels:
  - P1
projects:
  - caricorp/21

body:
  - type: markdown
    attributes:
      value: |
        Keep this short. Include logs, stack traces, screenshots, or failing output when available.

        Swimlane automation note:
        - Link pull requests with a closing keyword such as `Closes #<issue-number>`.
        - PR opened (draft or ready) -> `code-review`
        - PR merged -> `testing`
        - promote workflow success -> `released`

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Set the delivery priority.
      options:
        - P0 - critical
        - P1 - standard default
        - P2 - nice to have
      default: 1
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: What is broken?
      description: Brief summary of the bug.
      placeholder: "Saving a customer record fails and the page stays in a loading state."
    validations:
      required: true

  - type: input
    id: issue_url
    attributes:
      label: Issue URL
      description: Link the issue in the app (not the GitHub issue URL).
      placeholder: "https://app.example.com/issues/123"

  - type: textarea
    id: details
    attributes:
      label: Steps or context
      description: Add the shortest path to reproduce or any context that helps triage.
      placeholder: |
        1. Open customer details.
        2. Change the billing contact.
        3. Click Save.
        4. Observe the request fails.

  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: Paste any error, stack trace, screenshot, or failing test output.
      render: shell

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmation
      options:
        - label: I searched for an existing issue
          required: true
