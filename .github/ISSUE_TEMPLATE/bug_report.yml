name: Bug
description: Report a bug with the key details needed to triage it quickly
type: bug
title: "[bug] "
labels:
  - priority:2
projects:
  - caricorp/21

body:
  - type: markdown
    attributes:
      value: |
        Keep this short. For bugs, include the error log, stack trace, screenshot, or failing output whenever possible.

        Swimlane automation note:
        - Link pull requests with a closing keyword such as `Closes #<issue-number>`.
        - PR opened (draft or ready) -> `code-review`
        - PR merged -> `testing`
        - promote workflow success -> `released`

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Set the delivery priority.
      options:
        - 1 - critical (sale/owner default)
        - 2 - standard default
        - 3 - nice to have
      default: 1
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: What is broken?
      description: Brief summary of the bug.
      placeholder: "Saving a customer record fails and the page stays in a loading state."
    validations:
      required: true

  - type: input
    id: affected_area
    attributes:
      label: Affected app, service, or area
      placeholder: "billing-portal / customer save flow"

  - type: textarea
    id: details
    attributes:
      label: Steps or context
      description: Add the shortest path to reproduce or any context that helps triage.
      placeholder: |
        1. Open customer details.
        2. Change the billing contact.
        3. Click Save.
        4. Observe the request fails.

  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: Paste the error, stack trace, screenshot, or failing test output.
      render: shell
    validations:
      required: true

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmation
      options:
        - label: I searched for an existing issue
          required: true
        - label: I will link the pull request using a closing keyword (for example, Closes #123)
          required: true
