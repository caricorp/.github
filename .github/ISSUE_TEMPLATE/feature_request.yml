name: Feature
description: Request a feature with minimal intake boilerplate
type: feature
title: "[feat] "
labels:
  - P1
projects:
  - caricorp/21

body:
  - type: markdown
    attributes:
      value: |
        Use this for standard feature requests. Keep it concise so intake is easy.

        Swimlane automation note:
        - Link pull requests with a closing keyword such as `Closes #<issue-number>`.
        - PR opened (draft or ready) -> `code-review`
        - PR merged -> `testing`
        - promote workflow success -> `released`

  - type: dropdown
    id: request_source
    attributes:
      label: Request Source
      description: Who is driving this request?
      options:
        - owner
        - sales
        - other
      default: 0
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Set the delivery priority.
      options:
        - P0 - critical
        - P1 - standard default
        - P2 - nice to have
      default: 1
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: What do you need?
      description: Short description of the feature request.
      placeholder: "Add CSV export to the customer contracts list."
    validations:
      required: true

  - type: input
    id: issue_url
    attributes:
      label: Issue URL
      description: Link the issue in the app (not the GitHub issue URL).
      placeholder: "https://app.example.com/issues/123"

  - type: textarea
    id: details
    attributes:
      label: Context (optional)
      description: Include problem, expected outcome, and any acceptance notes if helpful.
      placeholder: |
        Problem: Account managers cannot quickly share filtered contract data.
        Outcome: Export current filtered list in under 10 seconds.
        Notes: Include applied filters and support up to 50k rows.

  - type: textarea
    id: source_context
    attributes:
      label: Source-specific context (optional)
      description: If source is sales or owner, add any customer/deal, deadline, impact, KPI, or scope details.
      placeholder: "Sales: Acme / SFDC-10482, needed by 2026-05-15, impacts renewal expansion."

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmation
      options:
        - label: I searched for an existing request
          required: true